<!DOCTYPE html>
<html>
<head>
    <title>Symposium Registration Form</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background: linear-gradient(to right,#4facfe,#00f2fe);
            margin:0;
            padding:20px;
        }

        .container{
            width:500px;
            margin:auto;
            background:white;
            padding:25px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            color:#003366;
        }

        label{
            font-weight:bold;
        }

        input, select, textarea{
            width:100%;
            padding:10px;
            margin-top:5px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:5px;
        }

        .gender{
            width:auto;
        }

        .btn{
            width:48%;
            padding:10px;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        .submit{
            background:#28a745;
            color:white;
        }

        .reset{
            background:#dc3545;
            color:white;
        }

        .buttons{
            display:flex;
            justify-content:space-between;
        }
    </style>
</head>

<body>

<div class="container">

<h2>SYMPOSIUM REGISTRATION FORM</h2>

<form>

<label>Full Name</label>
<input type="text" placeholder="Enter your name" required>

<label>College Name</label>
<input type="text" placeholder="Enter your college" required>

<label>Department</label>
<select required>
    <option>Select Department</option>
    <option>Computer Science</option>
    <option>Information Technology</option>
    <option>Electronics and Communication</option>
    <option>Electrical and Electronics</option>
    <option>Mechanical</option>
    <option>Civil</option>
</select>

<label>Year of Study</label>
<select required>
    <option>Select Year</option>
    <option>I Year</option>
    <option>II Year</option>
    <option>III Year</option>
    <option>IV Year</option>
</select>

<label>Email</label>
<input type="email" placeholder="Enter Email" required>

<label>Mobile Number</label>
<input type="tel" placeholder="Enter Mobile Number" required>

<label>Gender</label><br>

<input class="gender" type="radio" name="gender"> Male
<input class="gender" type="radio" name="gender"> Female
<input class="gender" type="radio" name="gender"> Other

<br><br>

<label>Select Event</label>

<select required>
    <option>Select Event</option>
    <option>Paper Presentation</option>
    <option>Project Expo</option>
    <option>Technical Quiz</option>
    <option>Poster Presentation</option>
    <option>Debugging</option>
    <option>Code Hunt</option>
</select>

<label>Accommodation Required</label>

<select>
    <option>No</option>
    <option>Yes</option>
</select>

<label>Comments</label>
<textarea rows="4" placeholder="Any Special Requirements"></textarea>

<div class="buttons">
<input class="btn submit" type="submit" value="Register">

<input class="btn reset" type="reset" value="Reset">
</div>

</form>

</div>

</body>
</html>
